services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
      VITE_MAP_API_KEY: ${VITE_MAP_API_KEY:-}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-student_life_db}
      DB_USER: ${DB_USER:-pnw_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      MAP_API_KEY: ${MAP_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-student_life_db}
      MYSQL_USER: ${DB_USER:-pnw_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./database/seed/03_map_features.sql:/docker-entrypoint-initdb.d/03_map_features.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
  mysql_data:
